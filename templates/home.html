<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Learning - Home</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            padding: 15px 40px;
            background-color: #1e3c72;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #00c6ff;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s ease;
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 25px;
            font-size: 32px;
        }

        p {
            line-height: 1.7;
            color: #444;
            margin-bottom: 30px;
            font-size: 18px;
        }

        /* MENU GRID */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .menu-card {
            background: #f8faff;
            border: 2px solid #e0e6ed;
            padding: 25px;
            border-radius: 12px;
            text-decoration: none;
            color: #1e3c72;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .menu-card span {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            font-weight: normal;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #1e3c72;
            background: #1e3c72;
            color: white;
        }

        .menu-card:hover span {
            color: #e0e6ed;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Machine Learning Cases</h2>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h1>Welcome to Machine Learning Cases</h1>
        <p>Explore different applications and models of Machine Learning by selecting an option below.</p>

        <div class="menu-grid">
            <a href="/caso1" class="menu-card">
                Use Case 1
                <span>Facial Recognition</span>
            </a>
            <a href="/caso2" class="menu-card">
                Use Case 2
                <span>Explore</span>
            </a>
            <a href="/caso3" class="menu-card">
                Use Case 3
                <span>Explore</span>
            </a>
            <a href="/caso4" class="menu-card">
                Use Case 4
                <span>Explore</span>
            </a>
            <a href="/FirstPage" class="menu-card" style="grid-column: 1 / -1; background: #eef2f9;">
                Linear Regression Model
                <span>Predict Customer Behavior</span>
            </a>
        </div>
    </div>

</body>
</html>
