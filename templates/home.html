<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ML App</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            padding: 70px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 40px;
            color: #dcdcdc;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            width: 260px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card h3 {
            color: #2a5298;
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
        }

        .card a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .card a:hover {
            background: #1e3c72;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🤖 Machine Learning App</h1>
        <p>Explore use cases and test ML models</p>

        <div class="cards">

            <div class="card">
                <h3>📊 Use Cases</h3>
                <p>Explore real-world ML problems</p>
                <a href="/use_cases">Go</a>
            </div>

            <div class="card">
                <h3>📘 Concepts</h3>
                <p>Learn machine learning basics</p>
                <a href="/lr/conceptos">Go</a>
            </div>

            <div class="card">
                <h3>🤖 Prediction</h3>
                <p>Test the ML model</p>
                <a href="/LinealRegresion">Go</a>
            </div>

        </div>
    </div>

</body>

</html>
