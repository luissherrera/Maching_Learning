<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Use Cases</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: #333;
            padding: 25px;
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #2a5298;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .card a:hover {
            background: #1e3c72;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📊 Machine Learning Use Cases</h1>

    <div class="cards">

        <div class="card">
            <h3>Case 1</h3>
            <p>Student Dropout Prediction</p>
            <a href="/caso1">Go</a>
        </div>

        <div class="card">
            <h3>Case 2</h3>
            <p>ML Use Case 2</p>
            <a href="/caso2">Go</a>
        </div>

        <div class="card">
            <h3>Case 3</h3>
            <p>ML Use Case 3</p>
            <a href="/caso3">Go</a>
        </div>

        <div class="card">
            <h3>Case 4</h3>
            <p>ML Use Case 4</p>
            <a href="/caso4">Go</a>
        </div>

    </div>
    
    <br>
    <a href="/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#2a5298;color:white;border-radius:6px;text-decoration:none;font-weight:bold;">Volver al Home</a>
</div>

</body>
</html>
