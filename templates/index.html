<!DOCTYPE html>
<html>
<head>
    <title>Machine Learning App</title>
</head>
<body>

    <h1>Modelo de Regresión Logística</h1>

    <h2>Exactitud del modelo: {{ accuracy }}</h2>

    <h3>Ingresar datos del cliente</h3>

    <form method="POST">
        Edad: <input type="number" name="edad" required><br><br>
        Ingreso mensual: <input type="number" name="ingreso" required><br><br>
        Visitas web al mes: <input type="number" name="visitas" required><br><br>
        Tiempo en sitio (min): <input type="number" step="0.1" name="tiempo" required><br><br>
        Compras previas: <input type="number" name="compras" required><br><br>
        Descuento usado (0 o 1): <input type="number" name="descuento" required><br><br>

        <button type="submit">Predecir</button>
    </form>

    {% if prediccion %}
        <h2>Resultado: {{ prediccion }}</h2>
    {% endif %}

</body>
</html>
